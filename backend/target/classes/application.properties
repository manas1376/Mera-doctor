# SwasthyaAI Backend Configuration
server.port=8080

# MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/swasthyaai
spring.data.mongodb.database=swasthyaai

# Firebase (set your credentials path)
firebase.credentials.path=firebase-credentials.json

# OpenAI
openai.api.key=${OPENAI_API_KEY:your_openai_key}
openai.model=gpt-3.5-turbo

# CORS
cors.allowed.origins=http://localhost:3000,https://your-domain.com

# Logging
logging.level.com.swasthyaai=DEBUG

# Security
jwt.secret=${JWT_SECRET:swasthyaai_secret_key_2024}
jwt.expiration=86400000
